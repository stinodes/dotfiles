

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

workspace = 8,defaultName:monitor-left,monitor:DP-1,default:true,persistent:true
workspace = 9,defaultName:monitor-right,monitor:DP-2,default:true,persistent:true
workspace = 1,monitor:$mainmonitor,default:true,persistent:true
workspace = 2,monitor:$mainmonitor
workspace = 3,monitor:$mainmonitor
workspace = 4,monitor:$mainmonitor
workspace = 5,monitor:$mainmonitor
workspace = 6,defaultName:game,monitor:$mainmonitor,persistent:true,rounding:false,border:false

# MESSENGERS
windowrule = match:class ^signal$, tag +messenger
windowrule = match:class ^discord$, tag +messenger
windowrule {
    name = messengers
    match:tag = messenger*

    workspace = special
}

# SPECIAL UI
windowrule = match:class (?!^rofi), float on

# GAMES
windowrule = match:class ^steam_app_\d+$, tag +game
windowrule = match:class wow.exe, tag +game
windowrule = match:class ^heroesofthestorm_x64.exe$, tag +game
windowrule {
    name = games
    match:tag = game*

    workspace = 6
    immediate = on
}

# TERM
windowrule = match:class ^com.mitchellh.ghostty, tag +term
windowrule {
    name = term
    match:tag = term*

    opacity = 0.92 .8 override
}



# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$\,title:^$, match:xwayland true, match:float true, match:fullscreen false, no_focus on
